<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intertrank - Premium Vídeo Telemetria & Rastreamento</title>
    
    <!-- Bibliotecas Necessárias -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Configuração do Tailwind -->
    <script>
          tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#003B5C',
                        orange: '#F58220',
                        deepNavy: '#001D2E',
                    },
                    animation: {
                        'slow-zoom': 'slow-zoom 30s linear infinite alternate',
                        'fade-in': 'fade-in 0.5s ease-out forwards',
                    }
                }
            }
        }
    </script>

    <style>
        @keyframes slow-zoom { from { transform: scale(1); } to { transform: scale(1.1); } }
        @keyframes fade-in { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse-glow-anim { 0%, 100% { opacity: 1; box-shadow: 0 0 20px rgba(245, 130, 32, 0.1); } 50% { opacity: 0.8; box-shadow: 0 0 40px rgba(245, 130, 32, 0.4); } }
        
        html { scroll-behavior: smooth; }
        body { 
            letter-spacing: -0.015em; 
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #001D2E; }
        ::-webkit-scrollbar-thumb { background: #F58220; border-radius: 3px; }
        
        .glass-nav {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hero-gradient {
            background: linear-gradient(90deg, rgba(0,29,46,1) 0%, rgba(0,29,46,0.85) 50%, rgba(0,29,46,0) 100%);
        }

        .play-button-ring {
            box-shadow: 0 0 0 0 rgba(245, 130, 32, 0.7);
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(245, 130, 32, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 25px rgba(245, 130, 32, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(245, 130, 32, 0); }
        }

        .no-scroll { overflow: hidden; }
        .premium-menu {
            background: linear-gradient(135deg, rgba(0, 59, 92, 0.98) 0%, rgba(0, 29, 46, 1) 100%);
            backdrop-filter: blur(25px);
        }
        
        .gallery-item-hover:hover .gallery-overlay { opacity: 1; }
        .gallery-overlay { transition: all 0.4s ease; }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);

            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    window.lucide.createIcons();
                }
            }, [name]);

            // Fallback para ícones de redes sociais que não existem no Lucide Core
            const socialIcons = {
                facebook: (
                    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
                    </svg>
                ),
                instagram: (
                    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
                    </svg>
                ),
                linkedin: (
                    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                        <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/>
                    </svg>
                )
            };

            if (socialIcons[name.toLowerCase()]) {
                return socialIcons[name.toLowerCase()];
            }

            return (
                <i 
                    ref={iconRef}
                    data-lucide={name} 
                    className={className} 
                    style={{ width: size, height: size, display: 'inline-block' }}
                ></i>
            );
        };

        // --- CONFIGURAÇÃO CENTRALIZADA ---
        const CONFIG_SITE = {
            whatsapp: {
                numero: "5522981563336",
                mensagens: {
                    navbar: "Olá Intertrank! Gostaria de solicitar um teste VIP via site.",
                    hero: "Olá! Vi o site e quero solicitar um teste das soluções Intertrank.",
                    mobile_menu: "Olá! Quero uma demonstração VIP personalizada.",
                    planos_geral: "Olá! Gostaria de mais informações sobre os planos de monitoramento.",
                    plano_moto: "Olá! Tenho interesse no monitoramento para Moto.",
                    plano_carro: "Olá! Tenho interesse no monitoramento para Carro.",
                    plano_caminhao: "Olá! Gostaria de saber mais sobre a gestão para Caminhão.",
                    plano_celular: "Olá! Quero proteger meu aparelho com o Celular Safe.",
                    plano_pet: "Olá! Tenho interesse na Coleira Pet GPS.",
                    plano_black: "Olá! Quero a tecnologia máxima e gostaria de fazer um orçamento.",
                    plano_agro: "Olá! Tenho interesse no Rastreio Agro e gostaria de montar um plano personalizado para minha operação.",
                    contato_modal: "Olá! Gostaria de uma Consultoria logística."
                }
            },
            imagens: {
                logo: "img/logo.png",
                logo_largura_nav: "40px",
                logo_altura_nav: "40px",
                logo_largura_footer: "50px",
                logo_altura_footer: "50px",
                hero_bg: "https://images.unsplash.com/photo-1519003722824-194d4455a60c?auto=format&fit=crop&w=1920&q=80",
                black_dash: "https://images.unsplash.com/photo-1542744094-3a31f272c490?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80",
                hardware_metrics: "https://images.unsplash.com/photo-1551288049-bb1c003f07af?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80",
                video_thumbnail: "https://img.youtube.com/vi/fs6ndIHw4YY/maxresdefault.jpg"
            },
            galeria: [
                { type: 'image', url: 'https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?auto=format&fit=crop&w=1200&q=80', title: 'Operação Logística Portuária', desc: 'Monitoramento em tempo real de ativos pesados.' },
                { type: 'image', url: 'https://images.unsplash.com/photo-1601584115197-04ecc0da31d7?auto=format&fit=crop&w=1200&q=80', title: 'Gestão de Frotas de Carga', desc: 'Telemetria avançada para redução de custos.' },
                { type: 'video', videoId: 'fs6ndIHw4YY', title: 'Apresentação Institucional', desc: 'Conheça nossa tecnologia MDVR.', thumb: 'https://img.youtube.com/vi/fs6ndIHw4YY/maxresdefault.jpg' },
                { type: 'image', url: 'https://images.unsplash.com/photo-1590674899484-d5640e854abe?auto=format&fit=crop&w=1200&q=80', title: 'Monitoramento Industrial', desc: 'Hardware blindado para condições extremas.' },
                { type: 'image', url: 'https://images.unsplash.com/photo-1509017174183-0b7e0278f1ec?auto=format&fit=crop&w=1200&q=80', title: 'Segurança Executiva', desc: 'Soluções Black Line para veículos premium.' },
                { type: 'video', videoId: 'dQw4w9WgXcQ', title: 'Treinamento de Equipes', desc: 'Suporte técnico especializado 24h.', thumb: 'https://images.unsplash.com/photo-1521737604893-d14cc237f11d?auto=format&fit=crop&w=1200&q=80' }
            ],
            redes_sociais: {
                linkedin: "https://www.linkedin.com/company/intertrank",
                instagram: "https://www.instagram.com/intertrank",
                facebook: "https://www.facebook.com/intertrank"
            }
        };

        const getWhatsAppLink = (mensagemKey) => {
            const msg = CONFIG_SITE.whatsapp.mensagens[mensagemKey] || CONFIG_SITE.whatsapp.mensagens.navbar;
            return `https://wa.me/${CONFIG_SITE.whatsapp.numero}?text=${encodeURIComponent(msg)}`;
        };

        // --- COMPONENTES DOS MODAIS ---

        const ModalGradeGaleria = ({ isOpen, onClose, items, onSelectItem }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[1000] flex items-center justify-center p-4 sm:p-8 overflow-y-auto">
                    <div className="fixed inset-0 bg-deepNavy/95 backdrop-blur-xl transition-opacity" onClick={onClose}></div>
                    <div className="relative bg-white rounded-[3rem] w-full max-w-7xl shadow-2xl overflow-hidden my-auto animate-fade-in border border-slate-100 flex flex-col max-h-[90vh]">
                        <div className="p-8 md:p-12 border-b border-slate-100 flex justify-between items-center bg-white sticky top-0 z-20">
                            <div className="text-left">
                                <h2 className="text-navy text-3xl md:text-5xl font-black tracking-tighter uppercase italic">Galeria Técnica</h2>
                                <p className="text-slate-400 text-xs font-bold uppercase tracking-widest mt-2 italic text-left">Portfólio de Operações Intertrank</p>
                            </div>
                            <button onClick={onClose} className="text-navy/20 hover:text-orange transition-all p-3">
                                <Icon name="x" size={32} />
                            </button>
                        </div>
                        <div className="p-8 md:p-12 overflow-y-auto">
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                                {items.map((item, i) => (
                                    <div 
                                        key={i} 
                                        onClick={() => onSelectItem(i)}
                                        className="group relative aspect-square rounded-[2.5rem] overflow-hidden cursor-pointer gallery-item-hover border border-slate-100 shadow-md"
                                    >
                                        <img 
                                            src={item.type === 'image' ? item.url : item.thumb} 
                                            alt={item.title} 
                                            className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110 grayscale group-hover:grayscale-0" 
                                        />
                                        <div className="absolute inset-0 bg-navy/60 opacity-0 gallery-overlay flex flex-col items-center justify-center p-6 text-center backdrop-blur-sm">
                                            <div className="w-12 h-12 bg-orange rounded-2xl flex items-center justify-center text-navy mb-4 transform -translate-y-4 group-hover:translate-y-0 transition-transform">
                                                <Icon name={item.type === 'image' ? 'maximize' : 'play'} size={24} />
                                            </div>
                                            <h4 className="text-white text-lg font-black uppercase italic tracking-tighter">{item.title}</h4>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ModalGaleriaLightbox = ({ isOpen, onClose, items, startIndex }) => {
            const [currentIndex, setCurrentIndex] = useState(startIndex);
            useEffect(() => { setCurrentIndex(startIndex); }, [startIndex]);
            if (!isOpen) return null;

            const next = () => setCurrentIndex((prev) => (prev + 1) % items.length);
            const prev = () => setCurrentIndex((prev) => (prev - 1 + items.length) % items.length);
            const currentItem = items[currentIndex];

            return (
                <div className="fixed inset-0 z-[2000] flex items-center justify-center bg-black/98 backdrop-blur-3xl animate-fade-in">
                    <button onClick={onClose} className="absolute top-8 right-8 text-white/50 hover:text-orange transition-all p-4 z-[2100]">
                        <Icon name="x" size={40} />
                    </button>
                    <button onClick={prev} className="absolute left-4 md:left-10 text-white/20 hover:text-orange transition-all p-4 z-[2100] hidden sm:block"><Icon name="chevron-left" size={60} /></button>
                    <button onClick={next} className="absolute right-4 md:right-10 text-white/20 hover:text-orange transition-all p-4 z-[2100] hidden sm:block"><Icon name="chevron-right" size={60} /></button>
                    <div className="w-full max-w-6xl px-6 flex flex-col items-center">
                        <div className="relative w-full aspect-video md:aspect-auto md:h-[75vh] rounded-[2rem] overflow-hidden shadow-2xl border border-white/10 bg-black flex items-center justify-center">
                            {currentItem.type === 'image' ? (
                                <img src={currentItem.url} alt={currentItem.title} className="w-full h-full object-contain" />
                            ) : (
                                <iframe className="w-full h-full" src={`https://www.youtube.com/embed/${currentItem.videoId}?autoplay=1`} frameBorder="0" allowFullScreen></iframe>
                            )}
                        </div>
                        <div className="mt-8 text-center">
                            <h3 className="text-white text-3xl font-black italic uppercase tracking-tighter">{currentItem.title}</h3>
                            <p className="text-white/40 text-sm mt-2 font-bold uppercase tracking-widest">{currentItem.desc}</p>
                        </div>
                    </div>
                </div>
            );
        };

        const ModalInformativo = ({ isOpen, onClose, title, content, icon }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[1000] flex items-center justify-center p-4 sm:p-8 overflow-y-auto">
                    <div className="fixed inset-0 bg-navy/90 backdrop-blur-md transition-opacity" onClick={onClose}></div>
                    <div className="relative bg-white rounded-[2.5rem] md:rounded-[4rem] w-full max-w-4xl shadow-2xl overflow-hidden my-auto animate-fade-in border border-slate-100">
                        <button onClick={onClose} className="absolute top-6 right-6 text-navy/20 hover:text-orange transition-all p-3 z-30">
                            <Icon name="x" size={28} />
                        </button>
                        <div className="p-8 md:p-16 overflow-y-auto max-h-[85vh] text-left">
                            <div className="flex flex-col items-center text-center mb-10">
                                <div className="p-5 bg-orange/10 rounded-[2rem] mb-6 text-orange text-center">
                                    <Icon name={icon || "info"} size={44} />
                                </div>
                                <h2 className="text-navy text-3xl md:text-5xl font-black tracking-tighter leading-tight text-center">{title}</h2>
                                <div className="w-16 h-1.5 bg-orange rounded-full mt-6 mx-auto"></div>
                            </div>
                            <div className="prose prose-slate max-w-none text-slate-600 leading-relaxed text-left">
                                {content}
                            </div>
                            <button onClick={onClose} className="mt-12 w-full bg-navy text-white py-5 rounded-2xl font-black uppercase tracking-widest text-[10px] hover:bg-orange transition-all active:scale-95 shadow-xl">
                                Entendido
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const ModalPlanos = ({ isOpen, onClose }) => {
            if (!isOpen) return null;
            const planos = [
                { icon: "bike", name: "Moto", ads: "R$ 99,00", mensal: "R$ 49,90", features: ["Rastreio 24h", "Cerca Digital", "Alerta de Ignição"], key: "plano_moto" },
                { icon: "car", name: "Carro", ads: "R$ 149,00", mensal: "R$ 69,90", features: ["Bloqueio via App", "Assistência 24h", "Histórico 1 ano"], key: "plano_carro" },
                { icon: "truck", name: "Caminhão", ads: "R$ 199,00", mensal: "R$ 99,90", features: ["Gestão de Ativos", "Logística Avançada", "Check-in Entrega"], key: "plano_caminhao" },
                { icon: "smartphone", name: "Celular Safe", ads: "GRÁTIS", mensal: "R$ 29,90", features: ["Localização Precisão", "Histórico de Trajeto", "Proteção de Dados"], key: "plano_celular" },
                { icon: "dog", name: "Coleira Pet GPS", ads: "R$ 89,00", mensal: "R$ 39,90", features: ["Resistente IP67", "Alerta de Perímetro", "Bateria Longa"], key: "plano_pet" },
                { icon: "award", name: "Black Premium", ads: "R$ 500,00", mensal: "R$ 199,90", features: ["Vídeo 4G Full HD", "Telemetria CAN Bus L2", "Gestão VIP 24h", "Até 4 Câmeras", "Solicite o Orçamento"], premium: true, key: "plano_black" },
                { icon: "sprout", name: "Agro Custom", ads: "SOB MEDIDA", mensal: "SOB CONSULTA", features: ["Maquinário Pesado", "Controle de Safra", "Gestão de Diesel", "Horímetro Real-Time", "Monte seu Plano"], premium: true, key: "plano_agro" }
            ];
            return (
                <div className="fixed inset-0 z-[1000] flex items-center justify-center p-4 sm:p-8 overflow-y-auto">
                    <div className="fixed inset-0 bg-deepNavy/95 backdrop-blur-xl transition-opacity" onClick={onClose}></div>
                    <div className="relative bg-white rounded-[3rem] w-full max-w-7xl shadow-2xl overflow-hidden my-auto animate-fade-in border border-slate-100">
                        <button onClick={onClose} className="absolute top-8 right-8 text-navy/20 hover:text-orange transition-all p-3 z-30">
                            <Icon name="x" size={32} />
                        </button>
                        <div className="p-8 md:p-12 lg:p-16 overflow-y-auto max-h-[90vh]">
                            <h2 className="text-navy text-4xl md:text-6xl font-black tracking-tighter text-center mb-16 uppercase italic">Planos de Monitoramento</h2>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                                {planos.map((p, i) => (
                                    <div key={i} className={`p-8 rounded-[3rem] flex flex-col border transition-all duration-500 hover:-translate-y-2 ${p.premium ? 'bg-navy text-white shadow-2xl border-orange border-2 scale-105' : 'bg-slate-50 border-slate-100'}`}>
                                        <div className={`w-14 h-14 rounded-2xl flex items-center justify-center shadow-md mb-8 ${p.premium ? 'bg-orange text-navy' : 'bg-white text-orange'}`}>
                                            <Icon name={p.icon} size={28} />
                                        </div>
                                        <h3 className="text-2xl font-black mb-2 text-left">{p.name}</h3>
                                        <div className="text-4xl font-black italic mb-10 text-left">{p.mensal}<span className="text-xs opacity-40 ml-1">/mês</span></div>
                                        <ul className="space-y-4 mb-12 flex-grow text-left">
                                            {p.features.map((f, idx) => (<li key={idx} className="flex items-center gap-3 text-xs font-bold text-left"><Icon name="check" size={16} className="text-orange shrink-0" /> {f}</li>))}
                                        </ul>
                                        <a href={getWhatsAppLink(p.key)} target="_blank" className={`w-full py-5 rounded-2xl font-black text-xs uppercase tracking-widest text-center transition-all shadow-lg ${p.premium ? 'bg-orange text-navy hover:bg-white' : 'bg-navy text-white hover:bg-orange'}`}>Assinar Agora</a>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ModalVideo = ({ isOpen, onClose }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[1000] flex items-center justify-center p-4 md:p-12 overflow-hidden">
                    <div className="fixed inset-0 bg-black/95 backdrop-blur-xl transition-opacity" onClick={onClose}></div>
                    <div className="relative w-full max-w-6xl aspect-video rounded-[2rem] md:rounded-[4rem] overflow-hidden shadow-2xl border-4 md:border-8 border-white/10 animate-fade-in bg-black">
                        <button onClick={onClose} className="absolute top-4 right-4 md:top-8 md:right-8 bg-black/50 text-white p-4 rounded-full hover:bg-orange transition-colors z-[1010]">
                            <Icon name="x" size={32} />
                        </button>
                        <iframe 
                            className="w-full h-full" 
                            src="https://www.youtube.com/embed/fs6ndIHw4YY?autoplay=1&rel=0&modestbranding=1" 
                            title="Intertrank Video" 
                            frameBorder="0" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                            allowFullScreen>
                        </iframe>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [isPlanosOpen, setIsPlanosOpen] = useState(false);
            const [isVideoOpen, setIsVideoOpen] = useState(false);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [infoModal, setInfoModal] = useState({ isOpen: false, title: "", content: null, icon: "info" });
            
            // Controle da Galeria
            const [isGridGalleryOpen, setIsGridGalleryOpen] = useState(false);
            const [lightboxState, setLightboxState] = useState({ isOpen: false, index: 0 });

            const openInfo = (type) => {
                const data = {
                    sobre: { 
                        title: "Engenharia Intertrank", icon: "users", 
                        content: (
                            <div className="space-y-6 text-left">
                                <p className="text-lg font-medium text-navy text-left uppercase italic font-black">Sobre a Intertrank: Inteligência em Movimento.</p>
                                <p className="text-left">A Intertrank é uma empresa de tecnologia especializada em soluções avançadas de Vídeo Telemetria e Rastreamento Veicular. Nascida com o propósito de transformar a gestão de frotas, unimos hardware de alta performance e softwares inteligentes para entregar o que há de mais moderno em segurança, logística e controle operacional. Diferente do rastreamento convencional, a Intertrank foca na inteligência de dados. Através da nossa tecnologia de vídeo telemetria, oferecemos aos gestores uma visão em tempo real do que acontece dentro e fora dos veículos, permitindo a redução de custos, a prevenção de acidentes e o aumento imediato da produtividade. Sediada em Macaé/RJ, um dos principais polos operacionais do país, a Intertrank carrega em seu DNA o rigor técnico e a excellence no atendimento. Nosso compromisso com a ética e a transparência é sólido: operamos em total conformidade com a LGPD (Lei Geral de Proteção de Dados), garantindo que as informações de nossos clientes sejam tratadas com o máximo sigilo e segurança cibernética. Hoje, a Intertrank vive um momento de forte expansão. Além de nossa sede, estamos ampliando nossa presença nacional através da abertura de filiais e parcerias estratégicas. Acreditamos que a tecnologia de ponta deve ser acessível e acompanhada de um suporte local de qualidade. Seja você um gestor em busca de eficiência para sua frota, um profissional talentoso querendo transformar o setor, ou um empreendedor interessado em levar nossa marca para novas regiões, a Intertrank é o seu parceiro de confiança no caminho para o futuro.</p>
                                <div className="grid grid-cols-2 gap-6 mt-10">
                                    <div className="p-8 bg-slate-50 rounded-[2.5rem] border border-slate-100 text-center">
                                        <div className="text-5xl font-black text-navy leading-none">+50k</div>
                                        <div className="text-[10px] font-bold uppercase text-orange mt-4 tracking-[0.3em]">Ativos Monitorados</div>
                                    </div>
                                    <div className="p-8 bg-slate-50 rounded-[2.5rem] border border-slate-100 text-center">
                                        <div className="text-5xl font-black text-navy leading-none">99.9%</div>

                                <p className="font-black text-navy text-lg text-left italic">Compromisso de Privacidade e Proteção de Dados - Na Intertrank Vídeo Telemetria, a segurança não é apenas o que entregamos em nossos serviços, mas também como cuidamos das suas informações. Em conformidade com a Lei Geral de Proteção de Dados (Lei nº 13.709/2018)</p>
                                <p className="text-left">1. O que coletamos e por quê? Para prestarmos nossos serviços de rastreamento e telemetria, tratamos dados como: Identificação: Nome, CPF/CNPJ e contato para gestão contratual e suporte. Localização e Telemetria: Dados gerados pelos dispositivos instalados nos veículos para fins de segurança patrimonial e gestão de frota. Imagens (Vídeo Telemetria): Quando aplicável, imagens de vídeo são processadas exclusivamente para monitoramento de segurança e análise de incidentes, conforme o contrato estabelecido.</p>
                                <p className="text-left">2. Como protegemos seus dados? Utilizamos medidas técnicas e administrativas para impedir acessos não autorizados, vazamentos ou qualquer forma de tratamento inadequado. Seus dados são armazenados em ambientes seguros e com acesso restrito.</p>
                                <p className="text-left">3. Com quem compartilhamos? A Intertrank não comercializa seus dados pessoais. O compartilhamento ocorre apenas com parceiros essenciais para a operação (ex: serviços de nuvem) ou por determinação legal/judicial, sempre seguindo padrões rigorosos de segurança.</p>
                                <p className="text-left">4. Seus Direitos (LGPD) Você, como titular, tem o direito de: Confirmar se tratamos seus dados e acessá-los. Corrigir dados incompletos ou desatualizados. Solicitar a exclusão de dados (observando os prazos legais de guarda de documentos). Revogar o consentimento para comunicações de marketing.</p>
                                <p className="text-left">5. Transparência Qualquer dúvida sobre como seus dados são geridos pela Intertrank pode ser enviada diretamente para o nosso canal de atendimento: contato@intertrank.com.br</p>

                                <p className="font-black text-navy text-lg text-left italic">Na Intertrank, entendemos que os dados de localização e as imagens de vídeo telemetria são ativos valiosos e sensíveis. Por isso, nossa gestão de dados é pautada por três pilares fundamentais:</p>
                                <p className="text-left">1. Coleta Consciente: Coletamos apenas as informações estritamente necessárias para a prestação dos nossos serviços de rastreamento e gestão de frotas. Isso inclui dados cadastrais para faturamento e dados técnicos dos veículos para monitoramento em tempo real.</p>
                                <p className="text-left">2. Segurança Cibernética: Tratamos seus dados com o mesmo rigor que tratamos a segurança dos seus veículos: Criptografia: Os dados transmitidos entre os rastreadores e nossos servidores são protegidos. Acesso Restrito: Apenas profissionais autorizados da Intertrank e o próprio cliente possuem acesso às informações de telemetria e imagens. Servidores Seguros: Utilizamos infraestrutura de ponta para garantir a integridade e a disponibilidade dos dados 24h por dia.</p>
                                <p className="text-left">3. Transparência Total (LGPD): Respeitamos integralmente a Lei Geral de Proteção de Dados (LGPD). Isso significa que: Seus dados são seus e nunca utilizaremos seus dados de localização ou imagens para fins diferentes daqueles contratados (segurança e logística). Não comercialização: A Intertrank jamais vende ou aluga bancos de dados de clientes para terceiros.</p>

                               <p className="text-left">5. Uso do Serviço de Rastreamento: O acesso é restrito via login e senha pessoais. A Intertrank atua como ferramenta de apoio à segurança, não substituindo apólices de seguro.</p>

                                        <div className="border-l-4 border-slate-100 pl-8 group hover:border-orange transition-all"><Icon name="cpu" size={32} className="text-orange mb-6" /><h4 className="text-navy font-black text-lg uppercase mb-2">Processamento</h4><p className="text-slate-400 text-sm font-medium">Quad-Core para processamento de vídeo.</p></div>
                                        <div className="border-l-4 border-slate-100 pl-8 group hover:border-orange transition-all"><Icon name="wifi" size={32} className="text-orange mb-6" /><h4 className="text-navy font-black text-lg uppercase mb-2">Conectividade</h4><p className="text-slate-400 text-sm font-medium">Módulo 5G/4G pronto para áreas críticas.</p></div>
                                    </div>
                                </div>
                                <div className="relative order-1 lg:order-2">
                                    <div className="rounded-[4.5rem] overflow-hidden shadow-2xl border-[20px] border-slate-50 group">
                                        <img src={CONFIG_SITE.imagens.hardware_metrics} className="w-full grayscale group-hover:grayscale-0 transition-all duration-1000 transform group-hover:scale-105" alt="Hardware Metrics" />
                                        <div className="absolute bottom-10 left-10 right-10 bg-navy/95 backdrop-blur-2xl p-8 rounded-[2.5rem] border border-white/10 flex justify-between items-center text-white opacity-0 group-hover:opacity-100 transition-all duration-700 shadow-2xl text-left">
                                            <div className="flex items-center gap-4 text-left">
                                                <div className="w-4 h-4 rounded-full bg-green-500 animate-pulse shadow-[0_0_15px_rgba(34,197,94,0.5)]"></div>
                                                <div className="text-left">
                                                    <p className="text-[10px] font-black uppercase opacity-50 tracking-widest leading-none">STATUS DO SISTEMA</p>
                                                    <p className="text-sm font-black mt-2 uppercase">99.9% ONLINE</p>
                                                </div>
                                            </div>
                                            <div className="text-right text-orange">
                                                <p className="text-[10px] font-black uppercase opacity-50 tracking-widest leading-none">LATÊNCIA</p>
                                                <p className="text-sm font-black mt-2 text-orange uppercase">0.1ms</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* VIDEO PRINCIPAL */}
                        <section className="py-24 bg-slate-50 text-center">
                            <div className="max-w-6xl mx-auto px-6">
                                <div className="text-center mb-16">
                                    <span className="text-orange font-black tracking-[0.4em] uppercase text-[10px] mb-6 block italic">Demonstração</span>
                                    <h2 className="text-navy text-4xl md:text-6xl font-black tracking-tighter leading-tight">Sinta a Tecnologia.</h2>
                                </div>
                                <div onClick={() => setIsVideoOpen(true)} className="relative rounded-[2.5rem] md:rounded-[4rem] overflow-hidden shadow-2xl group cursor-pointer border-[8px] md:border-[16px] border-white">
                                    <div className="aspect-video w-full bg-navy relative overflow-hidden">
                                        <img src={CONFIG_SITE.imagens.video_thumbnail} className="w-full h-full object-cover opacity-60 grayscale group-hover:grayscale-0 transition-all duration-1000" alt="Video Thumbnail" />
                                        <div className="absolute inset-0 flex items-center justify-center">
                                            <div className="w-24 h-24 md:w-32 md:h-32 bg-orange rounded-full flex items-center justify-center text-white play-button-ring transition-all group-hover:scale-110">
                                                <Icon name="play" size={40} className="fill-current ml-2" />
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* ESTATÍSTICAS */}
                        <section className="py-24 md:py-32 bg-deepNavy relative overflow-hidden text-center">
                            <div className="max-w-7xl mx-auto px-6 grid grid-cols-2 lg:grid-cols-4 gap-12 relative z-10 text-center">
                                {[
                                    { n: "+50k", l: "Ativos Monitorados", i: "truck" },
                                    { n: "1.5k+", l: "Empresas Parceiras", i: "building-2" },
                                    { n: "24/7", l: "Controle Tático VIP", i: "clock" },
                                    { n: "-30%", l: "Custos Reduzidos", i: "trending-down" }
                                ].map((s, i) => (
                                    <div key={i} className="group">
                                        <div className="text-orange mb-6 flex justify-center"><Icon name={s.i} size={36} /></div>
                                        <div className="text-5xl md:text-7xl font-black text-white italic mb-4 transition-transform leading-none">{s.n}</div>
                                        <div className="text-[10px] font-black uppercase tracking-[0.4em] text-white/40 leading-relaxed uppercase">{s.l}</div>
                                    </div>
                                ))}
                            </div>
                        </section>
                    </main>

                    {/* RODAPÉ */}
                    <footer id="footer" className="bg-deepNavy text-white pt-32 pb-16 text-left border-t border-white/5">
                        <div className="max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-4 gap-16 mb-24 text-left">
                            <div className="space-y-10">
                                <div className="flex items-center gap-4 group cursor-pointer" onClick={() => window.scrollTo(0,0)}>
                                    <div className="bg-white/5 rounded-2xl text-orange flex items-center justify-center overflow-hidden" style={{ width: CONFIG_SITE.imagens.logo_largura_footer, height: CONFIG_SITE.imagens.logo_altura_footer }}>
                                        {CONFIG_SITE.imagens.logo ? <img src={CONFIG_SITE.imagens.logo} alt="Logo" className="w-full h-full object-contain" /> : <Icon name="camera" />}
                                    </div>
                                    <span className="text-3xl font-black tracking-tighter uppercase italic">INTER<span className="text-orange">TRANK</span></span>
                                </div>
                                <div className="flex gap-5">
                                    {['linkedin', 'instagram', 'facebook'].map(s => (
                                        <a key={s} href={CONFIG_SITE.redes_sociais[s]} target="_blank" className="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center text-white/40 hover:bg-orange hover:text-navy transition-all shadow-xl">
                                            <Icon name={s} size={20} />
                                        </a>
                                    ))}
                                </div>
                            </div>
                            <div><h4 className="text-orange text-[11px] font-black uppercase mb-10 tracking-[0.5em] italic text-left">Navegação</h4><ul className="space-y-5 text-sm font-bold text-white/40 text-left"><li><button onClick={() => window.scrollTo(0,0)} className="hover:text-white transition-colors">Início</button></li><li><button onClick={() => handleNav('Galeria')} className="hover:text-white transition-colors">Galeria Técnica</button></li><li><button onClick={() => openInfo('etica')} className="hover:text-white transition-colors">Canal de Ética</button></li></ul></div>
                            <div><h4 className="text-orange text-[11px] font-black uppercase mb-10 tracking-[0.5em] italic text-left">Empresa</h4><ul className="space-y-5 text-sm font-bold text-white/40 text-left"><li><button onClick={() => openInfo('sobre')} className="hover:text-white transition-colors">Sobre Nós</button></li><li><button onClick={() => openInfo('trabalhe')} className="hover:text-white transition-colors">Trabalhe Conosco</button></li><li><button onClick={() => openInfo('contato')} className="hover:text-white transition-colors">Consultoria VIP</button></li></ul></div>
                            <div><h4 className="text-orange text-[11px] font-black uppercase mb-10 tracking-[0.5em] italic text-left">Legal</h4><ul className="space-y-5 text-sm font-bold text-white/40 text-left"><li><button onClick={() => openInfo('privacidade')} className="hover:text-white transition-colors">Privacidade</button></li><li><button onClick={() => openInfo('lgpd')} className="hover:text-white transition-colors">LGPD</button></li><li><button onClick={() => openInfo('termos')} className="hover:text-white transition-colors">Termos de Uso</button></li></ul></div>
                        </div>
                        <div className="pt-16 border-t border-white/5 text-center">
                            <p className="text-[9px] font-black uppercase tracking-[0.8em] text-white/10 italic">© 2024 INTERTRANK | Engenharia Logística Industrial</p>
                        </div>
                    </footer>

                    {/* BOTÃO FLUTUANTE */}
                    <button onClick={() => setIsPlanosOpen(true)} className="fixed bottom-6 right-6 z-[40] bg-orange hover:bg-navy text-white p-4 md:px-6 md:py-4 rounded-2xl md:rounded-3xl shadow-2xl flex items-center gap-3 transition-all transform hover:scale-105 group">
                        <Icon name="tag" size={24} />
                        <span className="hidden sm:block font-black uppercase tracking-widest text-[10px]">Ver Planos</span>
                    </button>

                    {/* PORTAL DE MODAIS */}
                    <ModalPlanos isOpen={isPlanosOpen} onClose={() => setIsPlanosOpen(false)} />
                    <ModalInformativo isOpen={infoModal.isOpen} onClose={() => setInfoModal({ ...infoModal, isOpen: false })} title={infoModal.title} content={infoModal.content} icon={infoModal.icon} />
                    <ModalVideo isOpen={isVideoOpen} onClose={() => setIsVideoOpen(false)} />
                    
                    {/* MODAIS DE GALERIA */}
                    <ModalGradeGaleria 
                        isOpen={isGridGalleryOpen} 
                        onClose={() => setIsGridGalleryOpen(false)} 
                        items={CONFIG_SITE.galeria} 
                        onSelectItem={(idx) => setLightboxState({ isOpen: true, index: idx })}
                    />
                    <ModalGaleriaLightbox 
                        isOpen={lightboxState.isOpen} 
                        onClose={() => setLightboxState({ ...lightboxState, isOpen: false })} 
                        items={CONFIG_SITE.galeria} 
                        startIndex={lightboxState.index} 
                    />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
