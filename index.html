<!DOCTYPE html>
<html lang="pt-PT">
<head>

    <!-- Bibliotecas Necessárias -->

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Configuração do Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#003B5C',
                        orange: '#F58220',
                        deepNavy: '#001D2E',
                    },
                    animation: {
                        'slow-zoom': 'slow-zoom 30s linear infinite alternate',
                        'fade-in': 'fade-in 0.4s ease-out forwards',
                        'pulse-glow': 'pulse-glow-anim 2s ease-in-out infinite',
                    }
                }
            }
        }
    </script>

    <style>
        @keyframes slow-zoom { from { transform: scale(1); } to { transform: scale(1.1); } }
        @keyframes fade-in { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse-glow-anim { 0%, 100% { opacity: 1; box-shadow: 0 0 20px rgba(245, 130, 32, 0.1); } 50% { opacity: 0.8; box-shadow: 0 0 40px rgba(245, 130, 32, 0.4); } }
        
        html { scroll-behavior: smooth; }
        body { 
            letter-spacing: -0.015em; 
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            background-color: #FFFFFF;
            overflow-x: hidden;
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #001D2E; }
        ::-webkit-scrollbar-thumb { background: #F58220; border-radius: 3px; }
        
        .glass-nav {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

            background: linear-gradient(90deg, rgba(0,29,46,1) 0%, rgba(0,29,46,0.85) 50%, rgba(0,29,46,0) 100%);
        }

        .play-button-ring {
            box-shadow: 0 0 0 0 rgba(245, 130, 32, 0.7);
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(245, 130, 32, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 25px rgba(245, 130, 32, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(245, 130, 32, 0); }
        }

        .no-scroll { overflow: hidden; }
        .premium-menu {
            background: linear-gradient(135deg, rgba(0, 59, 92, 0.98) 0%, rgba(0, 29, 46, 1) 100%);
            backdrop-filter: blur(25px);
        }

</head>

                                <p>A Intertrank é uma empresa de tecnologia especializada em soluções avançadas de Vídeo Telemetria e Rastreamento Veicular. Nascida com o propósito de transformar a gestão de frotas, unimos hardware de alta performance e softwares inteligentes para entregar o que há de mais moderno em segurança, logística e controle operacional. Diferente do rastreamento convencional, a Intertrank foca na inteligência de dados. Através da nossa tecnologia de vídeo telemetria, oferecemos aos gestores uma visão em tempo real do que acontece dentro e fora dos veículos, permitindo a redução de custos, a prevenção de acidentes e o aumento imediato da produtividade. Sediada em Macaé/RJ, um dos principais polos operacionais do país, a Intertrank carrega em seu DNA o rigor técnico e a excelência no atendimento. Nosso compromisso com a ética e a transparência é sólido: operamos em total conformidade com a LGPD (Lei Geral de Proteção de Dados), garantindo que as informações de nossos clientes sejam tratadas com o máximo sigilo e segurança cibernética. Hoje, a Intertrank vive um momento de forte expansão. Além de nossa sede, estamos ampliando nossa presença nacional através da abertura de filiais e parcerias estratégicas. Acreditamos que a tecnologia de ponta deve ser acessível e acompanhada de um suporte local de qualidade. Seja você um gestor em busca de eficiência para sua frota, um profissional talentoso querendo transformar o setor, ou um empreendedor interessado em levar nossa marca para novas regiões, a Intertrank é o seu parceiro de confiança no caminho para o futuro.</p>

                                    ].map((s, i) => (

                    lgpd: {
                        title: "Governança LGPD", icon: "shield-check",

                            <div className="space-y-6 text-sm text-slate-600 leading-relaxed text-left">
                                <p className="font-black text-navy text-lg">Compromisso de Privacidade e Proteção de Dados - Na Intertrank Vídeo Telemetria, a segurança não é apenas o que entregamos em nossos serviços, mas também como cuidamos das suas informações. Em conformidade com a Lei Geral de Proteção de Dados (Lei nº 13.709/2018)</p>
                                <p>1. O que coletamos e por quê? Para prestarmos nossos serviços de rastreamento e telemetria, tratamos dados como: Identificação: Nome, CPF/CNPJ e contato para gestão contratual e suporte. Localização e Telemetria: Dados gerados pelos dispositivos instalados nos veículos para fins de segurança patrimonial e gestão de frota. Imagens (Vídeo Telemetria): Quando aplicável, imagens de vídeo são processadas exclusivamente para monitoramento de segurança e análise de incidentes, conforme o contrato estabelecido.</p>
                                <p>2. Como protegemos seus dados? Utilizamos medidas técnicas e administrativas para impedir acessos não autorizados, vazamentos ou qualquer forma de tratamento inadequado. Seus dados são armazenados em ambientes seguros e com acesso restrito.</p>
                                <p>3. Com quem compartilhamos? A Intertrank não comercializa seus dados pessoais. O compartilhamento ocorre apenas com parceiros essenciais para a operação (ex: serviços de nuvem) ou por determinação legal/judicial, sempre seguindo padrões rigorosos de segurança.</p>
                                <p>4. Seus Direitos (LGPD) Você, como titular, tem o direito de: Confirmar se tratamos seus dados e acessá-los. Corrigir dados incompletos ou desatualizados. Solicitar a exclusão de dados (observando os prazos legais de guarda de documentos). Revogar o consentimento para comunicações de marketing.</p>
                                <p>5. Transparência Qualquer dúvida sobre como seus dados são geridos pela Intertrank pode ser enviada diretamente para o nosso canal de atendimento: [Inserir E-mail de Contato].</p>

                        content: (

                                <p className="font-black text-navy text-lg">Na Intertrank, entendemos que os dados de localização e as imagens de vídeo telemetria são ativos valiosos e sensíveis. Por isso, nossa gestão de dados é pautada por três pilares fundamentais:</p>
                                <p>1. Coleta Consciente Coletamos apenas as informações estritamente necessárias para a prestação dos nossos serviços de rastreamento e gestão de frotas. Isso inclui dados cadastrais para faturamento e dados técnicos dos veículos para monitoramento em tempo real.</p>
                                <p>2. Segurança Cibernética Tratamos seus dados com o mesmo rigor que tratamos a segurança dos seus veículos: Criptografia: Os dados transmitidos entre os rastreadores e nossos servidores são protegidos. Acesso Restrito: Apenas profissionais autorizados da Intertrank e o próprio cliente possuem acesso às informações de telemetria e imagens. Servidores Seguros: Utilizamos infraestrutura de ponta para garantir a integridade e a disponibilidade dos dados 24h por dia.</p>
                                <p>3. Transparência Total (LGPD) Respeitamos integralmente a Lei Geral de Proteção de Dados (LGPD). Isso significa que: Seus dados são seus: Você tem o direito de saber quais informações temos e como elas são usadas. Finalidade específica: Nunca utilizaremos seus dados de localização ou imagens para fins diferentes daqueles contratados (segurança e logística). Não comercialização: A Intertrank jamais vende ou aluga bancos de dados de clientes para terceiros.</p>

                               <p className="font-black text-navy text-lg">Termos e Condições de Uso - Intertrank Bem-vindo a Intertrank Vídeo Telemetria. Ao navegar em nosso portal ou contratar nossos serviços, você concorda com os termos abaixo descritos. Caso não concorde com algum ponto, recomendamos que não utilize nossas plataformas.</p>
                               <p>1. Objeto e Serviços A Intertrank presta serviços de rastreamento veicular, monitoramento e vídeo telemetria. Este site tem como objetivo apresentar nossas soluções, oferecer suporte e facilitar o contato comercial.</p>
                               <p>2. Responsabilidades do Usuário Ao utilizar nosso site ou sistemas, o usuário se compromete a: Fornecer informações verdadeiras e atualizadas nos formulários de contato. Não utilizar o conteúdo do site (textos, logotipos, imagens) para fins comerciais sem autorização previa. Não tentar burlar sistemas de segurança ou praticar atos que possam danificar a plataforma da Intertrank.</p>
                               <p>3. Propriedade Intelectual Todo o conteúdo disponível neste site — incluindo a marca Intertrank, design, códigos e textos — é de propriedade exclusiva da empresa ou de seus licenciadores, sendo protegido pelas leis de direitos autorais e propriedade industrial.</p>
                               <p>4. Limitação de Responsabilidade A Intertrank empenha seus melhores esforços para manter o site atualizado e seguro. No entanto: Não nos responsabilizamos por interrupções temporárias no acesso ao site decorrentes de falhas de internet ou manutenção técnica. Links para sites de terceiros (como redes sociais) não são de nossa responsabilidade quanto ao conteúdo ou práticas de privacidade.</p>
                               <p>5. Uso do Serviço de Rastreamento (Cláusula Geral) Para clientes que utilizam nossas plataformas de monitoramento: O acesso é restrito via login e senha, de uso pessoal e intransferível. O cliente é responsável por manter a confidencialidade de suas credenciais de acesso. A Intertrank atua como ferramenta de apoio à segurança e gestão, não substituindo apólices de seguro ou a responsabilidade do condutor.</p>
                               <p>6. Modificações nos Termos Podemos alterar estes Termos de Uso a qualquer momento para refletir mudanças em nossos serviços ou na legislação. As alterações entram em vigor assim que publicadas no site. </p>
                               <p>7. Foro e Legislação Aplicável Estes termos são regidos pelas leis da República Federativa do Brasil. Para dirimir quaisquer dúvidas ou conflitos, as partes elegem o foro da Comarca do Rio de Janeiro.</p>

                                <p>A Intertrank preza pela transparência, honestidade e respeito em todas as suas relações. Para garantir que nossos valores sejam seguidos, disponibilizamos este canal exclusivo para a comunicação de condutas que não estejam de acordo com o nosso Código de Ética ou com a legislação vigente (como a LGPD e a Lei Anticorrupção).</p>
                                <p><strong>O que deve ser relatado aqui? Este espaço deve ser utilizado para relatar situações como:</strong></p>

                    </footer>

                    {/* BOTÃO FLUTUANTE */}
                    <button onClick={() => setIsPlanosOpen(true)} className="fixed bottom-10 right-10 z-[350] bg-orange text-navy px-12 py-6 rounded-[2.5rem] shadow-2xl font-black text-xs uppercase tracking-widest active:scale-95 transition-all animate-pulse-glow flex items-center gap-3">
                        <Icon name="tag" size={24} />
                        <span className="hidden sm:block">Ver Planos</span>
                    </button>

                    <ModalPlanos isOpen={isPlanosOpen} onClose={() => setIsPlanosOpen(false)} />
                    <ModalInformativo isOpen={infoModal.isOpen} onClose={() => setInfoModal({ ...infoModal, isOpen: false })} title={infoModal.title} content={infoModal.content} icon={infoModal.icon} />
                    <ModalVideo isOpen={isVideoOpen} onClose={() => setIsVideoOpen(false)} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
